<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | NinaCakes</title>
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
    <header>
        <img src="images/ninacakes-logo.png" alt="NinaCakes Logo" class="logo">
        <p class="site-title">NinaCakes</p>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header> 

    <main>
        <section>
            <h1>Contact NinaCakes</h1>
            <p>Have a question about our low-sugar treats? Fill out the form below.</p>
            <form action="#" method="post">
                <div class="form-group">
                    <label for="user-name">Full Name:</label>
                    <input type="text" id="user-name" name="user-name" required>
                </div>
                <div class="form-group">
                    <label for="user-email">Email Address:</label>
                    <input type="email" id="user-email" name="user-email" required>
                </div>
                <div class="form-group">
                    <label for="message">Your Inquiry:</label>
                    <textarea id="message" name="message" rows="4"></textarea>
                </div>
                <button type="submit">Submit Inquiry</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 NinaCakes. Created by Addy Geniz.</p>
        <div class="socials">
            <a href="#">Instagram</a> | 
            <a href="#">Facebook</a> | 
            <a href="#">Twitter</a>
        </div>
    </footer>
    
</body>
</html>
